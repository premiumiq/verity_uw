services:

  postgres:
    image: pgvector/pgvector:pg16
    container_name: verity_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: verityuser
      POSTGRES_PASSWORD: veritypass123
      POSTGRES_MULTIPLE_DATABASES: verity_db,pas_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-multiple-dbs.sh:/docker-entrypoint-initdb.d/init.sh
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U verityuser"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:RELEASE.2024-11-07T00-52-20Z
    container_name: verity_minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio-setup:
    image: minio/mc
    container_name: verity_minio_setup
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin123;
      mc mb --ignore-existing local/submissions;
      mc mb --ignore-existing local/uw-guidelines;
      mc mb --ignore-existing local/ground-truth-datasets;
      echo 'MinIO buckets created';
      "

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: verity_app
    restart: unless-stopped
    environment:
      VERITY_DB_URL: postgresql://verityuser:veritypass123@postgres:5432/verity_db
      PAS_DB_URL: postgresql://verityuser:veritypass123@postgres:5432/pas_db
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin123
      MINIO_SECURE: "false"
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      APP_ENV: demo
    volumes:
      - ./verity:/app/verity
      - ./uw_demo:/app/uw_demo
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  minio_data:

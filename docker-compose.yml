services:

  postgres:
    image: pgvector/pgvector:pg16
    container_name: verity_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: verityuser
      POSTGRES_PASSWORD: veritypass123
      POSTGRES_MULTIPLE_DATABASES: verity_db,uw_db,edms_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-multiple-dbs.sh:/docker-entrypoint-initdb.d/init.sh
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U verityuser"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:RELEASE.2024-11-07T00-52-20Z
    container_name: verity_minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio-setup:
    image: minio/mc
    container_name: verity_minio_setup
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin123;
      mc mb --ignore-existing local/submissions;
      mc mb --ignore-existing local/uw-guidelines;
      mc mb --ignore-existing local/ground-truth-datasets;
      echo 'MinIO buckets created';
      "

  # ── EDMS: Enterprise Document Management System ─────────────
  # Runs as its own service on port 8002. Owns edms_db and MinIO access.
  # All document operations go through this service's REST APIs.
  edms:
    build:
      context: .
      dockerfile: edms/Dockerfile
    container_name: edms_service
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"
    environment:
      EDMS_DB_URL: postgresql://verityuser:veritypass123@postgres:5432/edms_db
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin123
      MINIO_SECURE: "false"
      EDMS_DEFAULT_BUCKET: submissions
    volumes:
      - ./edms:/app/edms
      - ./uw_demo/seed_docs:/app/seed_docs
    ports:
      - "8002:8002"
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8002/health"]
      interval: 15s
      timeout: 5s
      retries: 5

  # ── VERITY: AI Governance Platform ──────────────────────────
  # Runs the Verity admin web UI + API on port 8000.
  # This is the governance platform — independent of any business app.
  verity:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: verity_app
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"
    environment:
      VERITY_DB_URL: postgresql://verityuser:veritypass123@postgres:5432/verity_db
      APP_ENV: demo
    volumes:
      - ./verity:/app/verity
      - ./uw_demo:/app/uw_demo
      - ./scripts:/app/scripts
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 5
    # Runs Verity's own standalone server (admin UI at /admin/)
    command: ["uvicorn", "verity.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]

  # ── UW DEMO: Business Application Powered by Verity ─────────
  # Runs the underwriting demo on port 8001.
  # Uses Verity as a Python SDK (direct function calls, not HTTP).
  # Both containers share the same verity_db database.
  uw-demo:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: uw_demo_app
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"
    environment:
      VERITY_DB_URL: postgresql://verityuser:veritypass123@postgres:5432/verity_db
      UW_DB_URL: postgresql://verityuser:veritypass123@postgres:5432/uw_db
      EDMS_URL: http://edms:8002
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
    volumes:
      - ./verity:/app/verity
      - ./uw_demo:/app/uw_demo
      - ./scripts:/app/scripts
    ports:
      - "8001:8001"
    depends_on:
      postgres:
        condition: service_healthy
      edms:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 15s
      timeout: 5s
      retries: 5
    # Runs the UW demo business app on port 8001
    command: ["uvicorn", "uw_demo.app.main:app", "--host", "0.0.0.0", "--port", "8001", "--reload"]

volumes:
  postgres_data:
  minio_data:

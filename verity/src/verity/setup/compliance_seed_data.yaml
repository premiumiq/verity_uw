# =============================================================================
# Verity Compliance Seed Data — Canonical Requirements + Provisions + Bridges
# =============================================================================
#
# Source: Verity_Complete_Regulatory_Matrix_v2.md (47 matrix rows)
#
# Rationalization principle: decompose-as-needed, not minimization.
#   - Two matrix rows describing the same operational requirement collapse
#     to one canonical_requirement (e.g. "Model inventory" appears in
#     SR 11-7, NAIC, NAIC Eval Tool, cross-framework — one canonical).
#   - Two matrix rows describing related-but-distinct requirements stay
#     separate (e.g. pre-deployment fairness vs production fairness
#     monitoring; merging would mask Verity's Gap-rated coverage).
#
# Coverage levels mirror the matrix verbatim — full / substantial / partial / gap.
#
# Edit freely; re-running `verity compliance seed-data` UPSERTs by code.
#
# Architecture: docs/architecture/compliance-stack.md
# Build plan:   docs/plans/compliance-build-plan.md
# =============================================================================

# -----------------------------------------------------------------------------
# CANONICAL REQUIREMENTS — the rationalized vocabulary.
#
# Each canonical requirement carries: theme, title, description,
# coverage (level + rationale + customer_actions), feature_links.
# Provisions bridge to these via the provisions: section below.
# -----------------------------------------------------------------------------
canonical_requirements:

  # --- governance_program -----------------------------------------------------
  - code: model_inventory_registration
    theme: governance_program
    title: Model inventory & registration
    description: All AI models must be identified, catalogued, and centrally tracked.
    sort_seq: 10
    coverage:
      level: full
      rationale: |
        Every AI use case begins as a recorded intake before any model is
        built — capturing the business problem, owner, requesting team, risk
        tier, and NAIC materiality classification. Each registry artifact
        (agent version, task version, prompt template, tool, data connector,
        MCP server) is then versioned with name, owner, lifecycle state, and
        a back-reference to its originating intake. The model inventory is
        therefore traceable end-to-end from regulatory provision through
        approved use case through deployed component, and the cross-
        application inventory report enumerates every entity in the
        registered population.
      customer_actions: |
        Maintain organizational policy that no production AI is permitted
        outside the intake-and-registry flow; periodically reconcile the
        inventory against business-unit AI usage surveys.
    feature_links:
      - { code: use_case_intake_registry, role: primary }
      - { code: task_version_registration, role: primary }
      - { code: agent_version_registration, role: primary }
      - { code: prompt_template_versioning, role: supporting }
      - { code: tool_registration, role: supporting }
      - { code: mcp_server_trust_registry, role: supporting }
      - { code: application_registration, role: primary }
      - { code: model_inventory_report, role: primary }

  - code: model_ownership_accountability
    theme: governance_program
    title: Model ownership & accountability
    description: |
      Each model has a designated owner. Accountability for AI decisions
      (including third-party AI) is named, traceable, and queryable end-to-end.
    sort_seq: 20
    coverage:
      level: full
      rationale: |
        Every use case records its business owner and requesting team at
        intake; ownership flows through to every registry artifact built
        for that use case. Each lifecycle promotion is recorded with the
        responsible approver's name, role, and signed-at timestamp. Every
        write to the governance system records the role under which the
        user was acting, providing segregation-of-duty evidence. Override
        logs and decision logs are linked to named users so accountability
        is queryable end-to-end from any artifact back to its owner.
    feature_links:
      - { code: use_case_intake_registry, role: primary }
      - { code: persona_aware_action_gating, role: primary }
      - { code: agent_version_registration, role: supporting }
      - { code: task_version_registration, role: supporting }
      - { code: hitl_approval_records, role: primary }
      - { code: lifecycle_event_audit, role: supporting }
      - { code: immutable_decision_log, role: supporting }

  - code: written_ais_program
    theme: governance_program
    title: Written AIS Program
    description: |
      A documented AI Systems Program governing all AI use in regulated practices.
      The platform implements the operational program; the written policy
      wrapper is customer responsibility.
    sort_seq: 30
    coverage:
      level: substantial
      rationale: |
        The operational AI Systems Program is implemented end-to-end: an
        intake registry that records the business case for every use of AI;
        a multi-role approval chain that requires named signoff before any
        model is built; a 7-state lifecycle that gates promotion at each
        stage; testing, validation, and decision-logging facilities; and
        compliance reporting that emits regulator-ready evidence. The
        intake-aware promotion gate prevents any registry artifact from
        reaching production without an approved use case behind it.
      customer_actions: |
        The written policy document referencing the platform controls as
        the AI Systems Program infrastructure remains customer
        responsibility — including the program owner designation, the
        committee charter, and the periodic program review cadence.
    feature_links:
      - { code: use_case_intake_registry, role: primary }
      - { code: multi_role_approval_chain, role: primary }
      - { code: intake_promotion_gate, role: primary }
      - { code: seven_state_lifecycle, role: primary }
      - { code: configurable_gates_per_materiality, role: supporting }
      - { code: regulatory_evidence_package, role: supporting }
      - { code: incident_log, role: supporting }

  - code: ai_governance_organizational_structure
    theme: governance_program
    title: AI governance organizational structure
    description: |
      Documented governance structure — committee composition, roles,
      escalation paths — for AI risk management.
    sort_seq: 40
    coverage:
      level: full
      rationale: |
        Approval of every use case requires signoff from a tier-appropriate
        set of named roles — business owner, compliance, legal, model risk,
        AI governance, and (where applicable) security and privacy. Each
        role's signoff is durable, attributed, and timestamped, and the
        intake cannot move into the build phase until all required roles
        have signed. Every write to the system records the role under
        which the user was acting, providing structural segregation-of-
        duty evidence. Lifecycle promotions inherit the same
        role-attributed approval mechanism; incidents and overrides
        feed the escalation queue.
      customer_actions: |
        The written committee charter (membership, meeting cadence,
        quorum rules, escalation paths) and the role-to-person mapping
        for each persona remain customer responsibility.
    feature_links:
      - { code: multi_role_approval_chain, role: primary }
      - { code: persona_aware_action_gating, role: primary }
      - { code: hitl_approval_records, role: supporting }
      - { code: incident_log, role: supporting }
      - { code: lifecycle_event_audit, role: supporting }

  - code: model_risk_identification_classification
    theme: governance_program
    title: Model risk identification & classification
    description: |
      Models are identified and classified by risk level for ERM
      (enterprise risk management) purposes.
    sort_seq: 50
    coverage:
      level: full
      rationale: |
        Risk classification happens twice and durably: at intake time
        every use case is classified into one of four AI risk tiers
        (minimal, limited, high, unacceptable) with a written rationale,
        and is also classified as material or non-material under the
        NAIC Model Bulletin definition. Each registry artifact
        (agent, task) inherits its parent intake's risk profile and
        carries its own materiality tier for runtime gating. The
        cross-application inventory report exposes the population by
        tier; the incident log tracks any tier change driven by
        production events.
    feature_links:
      - { code: risk_tier_at_intake, role: primary }
      - { code: naic_materiality_classification, role: primary }
      - { code: materiality_tier_classification, role: primary }
      - { code: model_inventory_report, role: supporting }
      - { code: incident_log, role: supporting }

  # --- conceptual_soundness ---------------------------------------------------
  - code: model_conceptual_soundness
    theme: conceptual_soundness
    title: Conceptual soundness
    description: |
      Model design (theory, assumptions, logic) is documented sufficiently
      for a qualified reviewer.
    sort_seq: 10
    coverage:
      level: substantial
      rationale: |
        Metamodel stores design rationale, prompt content, tool allowlist,
        authority thresholds. Explainability output captures reasoning per decision.
      customer_actions: |
        LLM reasoning is probabilistic; formal "mathematical structure"
        documentation as envisioned for statistical models doesn't directly apply.
        Supplementary LLM Model Card per High-materiality agent needed.
    feature_links:
      - { code: agent_version_registration, role: primary }
      - { code: prompt_template_versioning, role: primary }
      - { code: tool_authorization_checking, role: supporting }
      - { code: validation_report_storage, role: supporting }

  - code: model_documentation_for_qualified_review
    theme: conceptual_soundness
    title: Model documentation sufficient for qualified review
    description: |
      Documentation of purpose, inputs, outputs, authority thresholds,
      validation results — sufficient for a qualified actuarial reviewer
      (ASOP 56 Sec. 3.4).
    sort_seq: 20
    coverage:
      level: full
      rationale: |
        Documentation accumulates across three durable layers. The intake
        layer captures the business problem, expected benefit, scope (in /
        out of scope decisions), affected populations, and — for limited
        and high-risk use cases — a complete impact assessment recording
        data sources, potential harms, mitigations, fairness and privacy
        considerations, and the human oversight plan. The requirements
        layer captures business, functional, non-functional, and
        compliance requirements with status tracking and back-references
        from each registry artifact. The registry layer stores purpose,
        inputs, outputs, authority thresholds, prompt templates, and
        validation results per version. Auto-generated documentation
        joins all three for any qualified reviewer.
      customer_actions: |
        Domain-specific narrative documentation (e.g. modeling
        assumptions, expert judgments, conservatism choices) that goes
        beyond the structured fields remains the responsibility of the
        modeling team; the platform stores it but does not generate it.
    feature_links:
      - { code: use_case_intake_registry, role: primary }
      - { code: intake_impact_assessment, role: primary }
      - { code: intake_requirements_traceability, role: primary }
      - { code: agent_version_registration, role: primary }
      - { code: validation_report_storage, role: primary }
      - { code: model_inventory_report, role: supporting }

  - code: model_limitations_documentation
    theme: conceptual_soundness
    title: Model limitations documentation
    description: |
      Known limitations and conditions under which the model may fail are
      documented and disclosed proactively.
    sort_seq: 30
    coverage:
      level: partial
      rationale: |
        Metamodel includes a limitations field per version. Validation reports
        document conditions under which accuracy degrades.
      customer_actions: |
        For LLM agents, full scope of limitations (hallucination risk, prompt
        sensitivity, out-of-distribution behavior) not automatically characterized.
        Supplementary documentation required. Proactive disclosure to
        management (ASOP 56 Sec. 3.8) is a customer process.
    feature_links:
      - { code: agent_version_registration, role: supporting }
      - { code: validation_report_storage, role: supporting }

  # --- data_inputs_governance -------------------------------------------------
  - code: input_data_quality
    theme: data_inputs_governance
    title: Input data quality & appropriateness
    description: |
      Input data is assessed for quality and relevance before reaching agents.
    sort_seq: 10
    coverage:
      level: substantial
      rationale: |
        Data classification tiers govern permissible inputs. Mock mode testing
        validates pipeline with controlled data. Source resolutions audit
        tracks per-binding provenance.
      customer_actions: |
        No automated data quality scoring or real-time data quality monitoring.
        Classification is at document-type level, not field-level.
    feature_links:
      - { code: source_binding_resolution, role: primary }
      - { code: source_resolutions_audit, role: primary }
      - { code: mock_mode_testing, role: supporting }

  - code: proxy_discrimination_screening
    theme: data_inputs_governance
    title: Proxy discrimination screening (input level)
    description: |
      Inputs are screened to prevent use of proxies for protected classes.
    sort_seq: 20
    coverage:
      level: substantial
      rationale: |
        Data classification tiers control what data flows to agents.
        Enrichment data fields screened for known protected-class proxies.
        MCP trust registry with data classification.
      customer_actions: |
        Automated proxy variable detection in unstructured data not built.
    feature_links:
      - { code: mcp_server_trust_registry, role: primary }
      - { code: source_binding_resolution, role: supporting }
      - { code: source_resolutions_audit, role: supporting }

  - code: external_data_algorithm_governance
    theme: data_inputs_governance
    title: External data sources & algorithms governance
    description: |
      List of external data sources and algorithms is producible on regulator request.
    sort_seq: 30
    coverage:
      level: full
      rationale: |
        MCP server trust registry is the exact implementation. Metamodel records
        which external tools each version can call. Both queryable and exportable.
    feature_links:
      - { code: mcp_server_trust_registry, role: primary }
      - { code: tool_registration, role: supporting }
      - { code: connector_registration, role: supporting }
      - { code: tool_authorization_checking, role: supporting }

  - code: data_governance_documentation
    theme: data_inputs_governance
    title: Data governance documentation
    description: |
      Documented governance policies for external data, including controls,
      access patterns, and quality standards.
    sort_seq: 40
    coverage:
      level: full
      rationale: |
        Data governance is documented at two layers. At the use-case
        layer, each impact assessment captures the data sources the AI
        will consume — owner, classification (public / internal /
        confidential / PII-restricted), access pattern, and quality
        considerations — alongside the populations affected and the
        privacy considerations that follow. At the platform layer,
        data classification policies are codified in the metamodel,
        and trust assessments document the governance of each external
        provider (data connectors, MCP servers).
      customer_actions: |
        Periodic re-validation that the data governance posture
        described at intake remains accurate (e.g. data sources
        haven't drifted, access controls remain in place) is the
        responsibility of the use-case owner.
    feature_links:
      - { code: intake_impact_assessment, role: primary }
      - { code: mcp_server_trust_registry, role: primary }
      - { code: connector_registration, role: supporting }

  # --- testing_validation -----------------------------------------------------
  - code: pre_deployment_testing
    theme: testing_validation
    title: Pre-deployment testing & validation
    description: |
      Models are tested before deployment. Multi-layer testing is required;
      no version reaches production without passing.
    sort_seq: 10
    coverage:
      level: full
      rationale: |
        Four-layer testing framework — mock mode → staging pytest → ground
        truth validation (F1 / precision / recall / kappa) → shadow deployment.
        All results stored in test_execution_log linked to entity version.
        No version promotes to Champion without passing all configured layers.
    feature_links:
      - { code: mock_mode_testing, role: primary }
      - { code: staging_pytest_suite, role: primary }
      - { code: ground_truth_validation, role: primary }
      - { code: shadow_deployment, role: primary }
      - { code: test_execution_log, role: supporting }

  - code: independent_qualified_validation
    theme: testing_validation
    title: Independent and qualified validation
    description: |
      Validation is performed by personnel structurally independent of the
      developer and possessing appropriate qualifications.
    sort_seq: 20
    coverage:
      level: substantial
      rationale: |
        High-materiality agents require named validator distinct from developer.
        Approval record captures both. Structured validation report.
      customer_actions: |
        Verity enforces the technical control but cannot guarantee organizational
        independence or actuarial qualification — the insurer must ensure model
        risk team is structurally separate from AI development and that pricing-
        influencing agents have qualified actuarial validators.
    feature_links:
      - { code: developer_validator_separation, role: primary }
      - { code: hitl_approval_records, role: primary }
      - { code: ground_truth_validation, role: supporting }

  - code: robustness_edge_cases
    theme: testing_validation
    title: Robustness across conditions including edge cases
    description: |
      AI performs reliably across conditions including edge cases. Adversarial
      and out-of-distribution behaviors are anticipated and tested.
    sort_seq: 30
    coverage:
      level: substantial
      rationale: |
        Ground truth datasets include edge cases designed by SMEs. Staging suite
        includes adversarial test cases. Shadow deployment measures full
        production distribution before promotion.
      customer_actions: |
        Formal adversarial robustness testing (red-teaming, prompt injection
        simulation) not in standard pipeline (B6).
    feature_links:
      - { code: ground_truth_validation, role: primary }
      - { code: staging_pytest_suite, role: supporting }
      - { code: shadow_deployment, role: supporting }

  - code: bias_testing_methodology
    theme: testing_validation
    title: Bias testing methodology
    description: |
      Methodology, dataset, and results of bias / fairness testing are
      documented and producible on regulator request.
    sort_seq: 40
    coverage:
      level: full
      rationale: |
        Complete methodology stored per version — dataset, demographic proxies,
        statistical tests, results. Documentation directly producible for examiner.
    feature_links:
      - { code: ground_truth_validation, role: primary }
      - { code: test_execution_log, role: primary }
      - { code: validation_report_storage, role: supporting }

  # --- fairness ---------------------------------------------------------------
  - code: fairness_pre_deployment
    theme: fairness
    title: Fairness — pre-deployment testing
    description: |
      AI must be tested for unfair discrimination and proxy bias before promotion.
    sort_seq: 10
    coverage:
      level: full
      rationale: |
        Fairness analysis is a mandatory validation step before promotion.
        Metrics include statistical parity tests across SIC sector, geographic
        region, revenue band. Enrichment data fields screened for protected
        class proxies.
    feature_links:
      - { code: ground_truth_validation, role: primary }
      - { code: test_execution_log, role: supporting }
      - { code: validation_report_storage, role: supporting }

  - code: fairness_production_monitoring
    theme: fairness
    title: Fairness — production monitoring
    description: |
      Ongoing monitoring of decision outputs for discriminatory outcomes
      (disparate impact) with automated alerts.
    sort_seq: 20
    coverage:
      level: gap
      rationale: |
        Decision data infrastructure is in place — outputs are logged with
        full provenance — but the alerting / disparity-tracking logic is not built.
      customer_actions: |
        Production fairness monitoring module required (B1) — track decision
        outcome distributions across demographic proxies in real time with
        automated alerts when disparity metrics exceed thresholds.
    feature_links:
      - { code: immutable_decision_log, role: supporting }
      - { code: drift_detection_agents, role: primary }

  # --- monitoring_drift -------------------------------------------------------
  - code: ongoing_performance_monitoring
    theme: monitoring_drift
    title: Ongoing performance monitoring
    description: |
      Performance is monitored continuously against benchmarks; override rates,
      confidence distributions, and incident frequencies are tracked.
    sort_seq: 10
    coverage:
      level: substantial
      rationale: |
        Champion metrics tracked in production. Override rate patterns,
        confidence distributions tracked. Incident log captures performance
        concerns. Decision log provides monitoring data infrastructure.
      customer_actions: |
        No built-in SPC engine. Automated drift detection with configurable
        thresholds requires supplementary configuration (B2).
    feature_links:
      - { code: immutable_decision_log, role: primary }
      - { code: model_invocation_log, role: supporting }
      - { code: incident_log, role: supporting }

  - code: model_drift_monitoring_with_thresholds
    theme: monitoring_drift
    title: Model drift monitoring with thresholds
    description: |
      Statistical drift detection with configurable control-chart thresholds
      and alerting when boundaries are crossed.
    sort_seq: 20
    coverage:
      level: partial
      rationale: |
        Override rate tracking, incident log, performance data in decision logs.
        Drift detection agents planned (A1).
      customer_actions: |
        No automated drift detection with configurable control-chart thresholds (B2).
        Data is available; alerting logic is not built.
    feature_links:
      - { code: immutable_decision_log, role: supporting }
      - { code: drift_detection_agents, role: primary }
      - { code: incident_log, role: supporting }

  - code: outcome_back_testing
    theme: monitoring_drift
    title: Continuous monitoring & back-testing against realized outcomes
    description: |
      AI decisions are back-tested against eventual realized outcomes
      (e.g. claim losses 12–24 months later).
    sort_seq: 30
    coverage:
      level: partial
      rationale: |
        Production monitoring tracks metrics, override rates. Decision data
        stored for analysis.
      customer_actions: |
        True back-testing (comparing AI decisions to loss outcomes 12–24 months
        later) requires claims system integration and separate analytics
        capability (B4).
    feature_links:
      - { code: immutable_decision_log, role: supporting }
      - { code: model_invocation_log, role: supporting }

  # --- change_management ------------------------------------------------------
  - code: change_management_versioning
    theme: change_management
    title: Change management with versioning and approval
    description: |
      Every model change creates a new version, goes through documented change
      management with approval, and preserves full change history.
    sort_seq: 10
    coverage:
      level: full
      rationale: |
        Every change creates a new version record. Promotion of any
        artifact is gated on its parent intake being in approved or live
        status; high-risk intakes additionally require an explicit
        promote-to-champion approval per artifact at the moment of
        production deployment. State transitions are recorded with the
        approver's name, role, and timestamp. Prompt changes are
        versioned independently; composition is frozen at promotion;
        full change history is permanently stored and queryable from any
        registry artifact back to its originating use case.
    feature_links:
      - { code: intake_promotion_gate, role: primary }
      - { code: multi_role_approval_chain, role: primary }
      - { code: seven_state_lifecycle, role: primary }
      - { code: hitl_approval_records, role: primary }
      - { code: frozen_composition_at_promotion, role: primary }
      - { code: lifecycle_event_audit, role: primary }
      - { code: prompt_template_versioning, role: supporting }

  # --- use_user_controls ------------------------------------------------------
  - code: use_user_authorization_controls
    theme: use_user_controls
    title: Use and user authorization controls
    description: |
      Controls ensure the model is used only for its intended purpose by
      authorized users; tool calls are restricted to declared capabilities.
    sort_seq: 10
    coverage:
      level: full
      rationale: |
        Authorization is enforced at three layers. At the design layer,
        every write to the governance system records the role under
        which the user was acting; actions are gated by a documented
        role-action matrix. At the asset layer, tool allowlists restrict
        agent capabilities and authority thresholds in the metamodel
        constrain runtime behaviour. At the operational layer, HITL
        gates prevent action above thresholds without human
        confirmation, and quotas limit per-entity usage. Materiality
        tiers and intake risk tiers together govern the strictness of
        controls applied.
    feature_links:
      - { code: persona_aware_action_gating, role: primary }
      - { code: tool_authorization_checking, role: primary }
      - { code: write_authority_per_tool, role: primary }
      - { code: configurable_gates_per_materiality, role: supporting }
      - { code: rate_limiting, role: supporting }
      - { code: hitl_approval_records, role: supporting }

  - code: human_oversight_intervention
    theme: use_user_controls
    title: Human oversight & intervention
    description: |
      Meaningful human oversight; ability to override or shut down AI decisions
      and to roll back models in production.
    sort_seq: 20
    coverage:
      level: full
      rationale: |
        Human oversight is captured up front and enforced at runtime.
        At intake, every use case records its human-in-the-loop
        strategy (how humans review or override AI output) and the
        review trigger condition (always | confidence threshold |
        sample | exception). At promotion, HITL gates require explicit
        approval at materiality-driven checkpoints. At runtime, an
        override mechanism with reason-coded logging captures every
        human correction; rollback to the prior champion is possible
        in under a minute via a single API call; agent suspension is
        possible without code deployment.
    feature_links:
      - { code: human_oversight_strategy_capture, role: primary }
      - { code: hitl_approval_records, role: primary }
      - { code: champion_resolution_at_runtime, role: primary }
      - { code: configurable_gates_per_materiality, role: supporting }
      - { code: lifecycle_event_audit, role: supporting }

  - code: risk_proportionate_controls
    theme: use_user_controls
    title: Risk-proportionate controls
    description: |
      Controls are commensurate with risk — high-materiality systems get full
      governance; low-materiality systems get lightweight tracking.
    sort_seq: 30
    coverage:
      level: full
      rationale: |
        Risk tier is set at intake and drives every downstream control.
        Unacceptable-tier intakes are auto-rejected. High-risk intakes
        require five approval roles (business owner, compliance, legal,
        model risk, AI governance), a documented impact assessment with
        human-oversight plan, and a separate promote-to-champion approval
        per artifact. Limited-risk intakes require three approval roles
        and an impact assessment. Minimal-risk intakes require business
        owner signoff only. Materiality tiers (high / medium / low) on
        each artifact govern the runtime gate set; quotas constrain
        per-entity usage proportionally.
    feature_links:
      - { code: risk_tier_at_intake, role: primary }
      - { code: multi_role_approval_chain, role: primary }
      - { code: materiality_tier_classification, role: primary }
      - { code: configurable_gates_per_materiality, role: primary }
      - { code: rate_limiting, role: supporting }

  # --- transparency_explainability --------------------------------------------
  - code: ai_transparency_descriptions
    theme: transparency_explainability
    title: AI transparency — plain-language descriptions
    description: |
      Plain-language descriptions of AI use are available for regulators and
      policyholders, including each agent's purpose, inputs, outputs, limitations.
    sort_seq: 10
    coverage:
      level: full
      rationale: |
        Metamodel stores human-readable descriptions of every agent's purpose,
        inputs, outputs, limitations. Auto-documentation generator produces
        plain-language agent capability documents.
    feature_links:
      - { code: agent_version_registration, role: primary }
      - { code: task_version_registration, role: primary }
      - { code: model_inventory_report, role: supporting }

  - code: decision_explainability
    theme: transparency_explainability
    title: Decision-level explainability
    description: |
      AI decisions are explainable in specific, plain-language terms — citing
      the factors and the responsible agent.
    sort_seq: 20
    coverage:
      level: full
      rationale: |
        Decision agents produce structured reasoning summaries per submission.
        System auto-generates adverse action summaries citing specific risk
        factors, agent version, approving underwriter. Stored in Vault linked
        to submission.
    feature_links:
      - { code: immutable_decision_log, role: primary }
      - { code: model_invocation_log, role: primary }
      - { code: detail_level_control, role: supporting }
      - { code: execution_context_threading, role: supporting }

  - code: adverse_action_explainability
    theme: transparency_explainability
    title: Adverse action explainability
    description: |
      Adverse action notices include specific, understandable reasons drawn
      from the actual decision logic, not post-hoc reconstruction.
    sort_seq: 30
    coverage:
      level: full
      rationale: |
        Decision agents produce structured adverse action summaries citing
        specific risk factors. Underwriter reviews before inclusion in notice.
        Reasoning from actual decision logic, not post-hoc.
    feature_links:
      - { code: immutable_decision_log, role: primary }
      - { code: model_invocation_log, role: primary }
      - { code: detail_level_control, role: supporting }

  # --- privacy_security -------------------------------------------------------
  - code: privacy_data_security
    theme: privacy_security
    title: Privacy & data security
    description: |
      AI complies with state data privacy and security laws; PII handling and
      data classification controls are enforced.
    sort_seq: 10
    coverage:
      level: substantial
      rationale: |
        Four-tier data classification governs agent / tool access. Tier 3 / 4
        data cannot go to external MCP servers without explicit authorization.
        All MCP tool calls logged with data classification assessed. Redaction
        pipeline scrubs PII before storage.
      customer_actions: |
        No automated PII detection in unstructured document inputs (B3).
        Classification depends on document-type tier, not real-time content scanning.
    feature_links:
      - { code: detail_level_control, role: primary }
      - { code: mcp_server_trust_registry, role: supporting }
      - { code: tool_authorization_checking, role: supporting }

  # --- third_party_oversight --------------------------------------------------
  - code: third_party_vendor_oversight
    theme: third_party_oversight
    title: Third-party vendor oversight
    description: |
      Third-party AI / vendors are subject to equivalent governance — trust
      assessments, allowed-tools registries, decision logging on every call.
    sort_seq: 10
    coverage:
      level: substantial
      rationale: |
        MCP server trust registry with trust level, allowed tools, last
        assessment date. All external tool calls logged with authorization
        checks. Claude API registered as third-party vendor.
      customer_actions: |
        Formal third-party AI vendor risk assessment documents (Anthropic
        model card review, SOC 2, data processing agreement) are supplementary.
        Contractual terms (audit rights, cooperation clauses) are customer's
        procurement responsibility.
    feature_links:
      - { code: mcp_server_trust_registry, role: primary }
      - { code: tool_authorization_checking, role: supporting }
      - { code: tool_calls_audit, role: supporting }
      - { code: mcp_client, role: supporting }

  # --- consumer_protection ----------------------------------------------------
  - code: consumer_ai_notification
    theme: consumer_protection
    title: Consumer notification of AI use
    description: |
      Consumers are informed when AI is used in decisions affecting them.
    sort_seq: 10
    coverage:
      level: partial
      rationale: |
        Decision records are available and queryable for disclosure. Reasoning
        text and risk factors stored per decision.
      customer_actions: |
        The notification mechanism (when, how, what to tell consumers) is
        app-level and business-process. Verity stores the evidence needed
        for disclosure but doesn't generate consumer-facing notices.
    feature_links:
      - { code: immutable_decision_log, role: supporting }
      - { code: detail_level_control, role: supporting }

  - code: utpa_compliance_ai
    theme: consumer_protection
    title: UTPA compliance for AI decisions
    description: |
      AI decisions comply with the Unfair Trade Practices Act — including no
      AI-only adverse decisions and explainability for adverse outcomes.
    sort_seq: 20
    coverage:
      level: substantial
      rationale: |
        HITL prevents AI-only adverse decisions. Explainability for adverse
        outcomes. Lifecycle prevents untested AI reaching production.
      customer_actions: |
        Substantive UTPA compliance (rate filings, form approvals) is the
        customer's legal responsibility.
    feature_links:
      - { code: hitl_approval_records, role: primary }
      - { code: configurable_gates_per_materiality, role: supporting }

  - code: insurance_law_compliance
    theme: consumer_protection
    title: Compliance with insurance laws (rate filings, etc.)
    description: |
      AI complies with all applicable insurance laws including rate filing
      requirements; AI-assisted rating decisions are consistent with filed rates.
    sort_seq: 30
    coverage:
      level: partial
      rationale: |
        Lifecycle and governance processes support compliance. Materiality
        tier and regulatory notes help flag compliance-sensitive agents.
      customer_actions: |
        Verity does not contain insurance law compliance logic. Insurer must
        separately ensure AI-assisted rating decisions are consistent with
        filed rates.
    feature_links:
      - { code: materiality_tier_classification, role: supporting }
      - { code: configurable_gates_per_materiality, role: supporting }

  # --- examination_readiness --------------------------------------------------
  - code: regulatory_examination_readiness
    theme: examination_readiness
    title: Regulatory examination readiness
    description: |
      Prepared to produce the documentation and evidence required during
      market conduct examinations — covering NAIC Evaluation Tool Exhibits A–D.
    sort_seq: 10
    coverage:
      level: full
      rationale: |
        Examination evidence assembles from layered durable records.
        The use-case intake registry provides the model inventory with
        business owner, risk tier, and approval status for every AI
        system in production. The multi-role approval chain provides a
        durable audit trail of every signoff (role, approver, decision,
        timestamp, optional evidence URL) — answering "who approved what,
        when, and on what evidence." Every write to the system records
        the role under which the user was acting. Decision logs are
        queryable end-to-end via execution_context_id; test execution
        logs record validation outcomes; a regulatory evidence package
        composes any subset for export. These outputs map directly to
        NAIC Evaluation Tool Exhibits A–D.
      customer_actions: |
        Formatting to match specific Evaluation Tool exhibit templates
        may need customization. Examination response procedures
        (timeline expectations, contact protocols) remain customer
        responsibility.
    feature_links:
      - { code: use_case_intake_registry, role: primary }
      - { code: multi_role_approval_chain, role: primary }
      - { code: persona_aware_action_gating, role: primary }
      - { code: model_inventory_report, role: primary }
      - { code: regulatory_evidence_package, role: primary }
      - { code: test_execution_log, role: supporting }
      - { code: execution_context_threading, role: supporting }

  - code: annual_compliance_certification
    theme: examination_readiness
    title: Annual compliance certification
    description: |
      Annual certification to the regulator that AI systems comply with
      applicable requirements (CO Sec. 10-3-1104.9(5); CT MC-25).
    sort_seq: 20
    coverage:
      level: partial
      rationale: |
        Verity produces the underlying evidence — fairness reports, model
        inventory, data source registry. Evidence packages generated from trust DB.
      customer_actions: |
        Certification workflow (extract reports → legal review → executive
        sign-off → filing) is a customer process.
    feature_links:
      - { code: regulatory_evidence_package, role: primary }
      - { code: model_inventory_report, role: supporting }
      - { code: validation_report_storage, role: supporting }

  # --- data_lineage_provenance ------------------------------------------------
  - code: data_lineage_provenance
    theme: data_lineage_provenance
    title: Data lineage & provenance tracking
    description: |
      Full data lineage and provenance — from input source through agent
      reasoning through write target — is captured and queryable.
    sort_seq: 10
    coverage:
      level: full
      rationale: |
        Source resolutions per-binding audit (connector, method, fetch_id,
        payload_bytes, duration). Target writes with handles. Vault document
        lineage (parent → child). Execution context threading across workflows.
    feature_links:
      - { code: source_resolutions_audit, role: primary }
      - { code: target_writes_audit, role: primary }
      - { code: tool_calls_audit, role: primary }
      - { code: execution_context_threading, role: primary }
      - { code: edms_vault_connector, role: supporting }
      - { code: derived_document_creation, role: supporting }

  # --- board_reporting --------------------------------------------------------
  - code: board_senior_mgmt_reporting
    theme: board_reporting
    title: Board & senior management reporting
    description: |
      Regular reports on model risk to senior management and the board.
    sort_seq: 10
    coverage:
      level: substantial
      rationale: |
        Model Inventory Report designed for Model Risk Committee review.
        Incident log feeds senior management reporting. Regulatory evidence
        packages exportable.
      customer_actions: |
        No pre-formatted board-level dashboard or report template. Insurer's
        model risk function must design board reporting format (B5).
    feature_links:
      - { code: model_inventory_report, role: primary }
      - { code: incident_log, role: supporting }
      - { code: regulatory_evidence_package, role: supporting }



# -----------------------------------------------------------------------------
# Regulatory frameworks — the shelf.
# -----------------------------------------------------------------------------
frameworks:
  - code: SR_11_7
    name: SR 11-7 — Federal Reserve / OCC Model Risk Management Guidance
    jurisdiction: US-FED
    version: "2011-04"
    effective_date: 2011-04-04
    source_url: https://www.federalreserve.gov/supervisionreg/srletters/sr1107.htm
    description: |
      The de facto gold standard for model governance across financial services.
      State insurance regulators increasingly reference it in AI examinations
      and expect equivalent rigor.
    sort_seq: 10

  - code: NAIC_AI_BULLETIN
    name: NAIC AI Model Bulletin
    jurisdiction: US-NAIC
    version: "2023-12"
    effective_date: 2023-12-04
    source_url: https://content.naic.org/sites/default/files/inline-files/2023-12-4%20Model%20Bulletin_Adopted_0.pdf
    description: |
      Primary insurance-specific AI regulatory guidance. Adopted by 24+ states
      as of April 2025. Establishes the AIS Program requirement and examination
      expectations.
    sort_seq: 20

  - code: NAIC_EVAL_TOOL
    name: NAIC AI Systems Evaluation Tool
    jurisdiction: US-NAIC
    version: "2026-03"
    effective_date: 2026-03-01
    description: |
      4-exhibit examination tool — pilot launched March 2026 in 12 states.
      Drives what state insurance examiners actually request during AI exams.
    sort_seq: 30

  - code: CO_SB21_169
    name: Colorado SB21-169 — Restrict Insurers' Use of External Consumer Data
    jurisdiction: US-CO
    version: "2021"
    effective_date: 2026-06-30   # original delayed enforcement; subject to revision
    source_url: https://leg.colorado.gov/sites/default/files/2021a_169_signed.pdf
    description: |
      First state law targeting algorithmic bias in insurance. Most directly
      applicable state law for P&C insurers using AI in underwriting.
      Similar legislation active in CT, CA, NY, and others.
    sort_seq: 40

  - code: ORSA_ASOP_56_CAS
    name: ORSA / ASOP No. 56 / CAS Principles
    jurisdiction: INDUSTRY
    version: "consolidated"
    description: |
      Three complementary industry self-governance standards:
      ORSA (enterprise risk management), ASOP 56 (actuarial modeling),
      CAS Principles (fairness in insurance algorithms).
    sort_seq: 50


[pytest]
# Workspace-root pytest config. Lives here (not in verity/pyproject.toml)
# so VSCode's Python Testing UI auto-discovers tests when the workspace
# folder is opened.
#
# When edms/insurance_docgen/uw_demo grow test suites, append their tests
# directories to `testpaths` below — no per-project pytest.ini needed.

# Test discovery — paths relative to this file (the repo root).
testpaths = verity/tests

# Default file/class/function naming. Same as pytest's built-in defaults,
# stated explicitly so future readers don't have to guess.
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Async test mode. With "auto", every `async def test_*` runs in an event
# loop without needing a per-test `@pytest.mark.asyncio` decorator.
asyncio_mode = auto

# Default command-line flags applied on every run.
addopts =
    --verbose
    --tb=short
    --strict-markers
    -ra
    --color=yes

# Markers must be declared here; --strict-markers above turns typos into
# errors instead of silently ignored test collection.
#
# Layer + domain markers are auto-applied by the conftest hook in
# verity/tests/conftest.py based on test file path. Manual markers
# (slow, flaky, security, llm_real) still go on individual tests.
markers =
    # Layer (auto-applied from path)
    unit:        pure-Python test, no I/O, fast (target <10ms each)
    integration: real Postgres + mocked LLM/EDMS — exercises real SQL
    e2e:         real LLM (opt-in, deferred)
    # Resource needs
    database:    requires a running Postgres reachable via VERITY_TEST_DATABASE_URL
    llm_real:    requires ANTHROPIC_API_KEY (skipped by default)
    # Speed
    slow:        takes > 1s on a developer machine
    # Domain (auto-applied from path)
    db:          DB plumbing — schema, migrations, query loader
    models:      Pydantic model validation
    contracts:   boundary contracts (MockContext, grammar)
    engine:      ExecutionEngine — gateway calls, run_agent, run_task
    governance:  lifecycle, approvals, HITL, registry
    validation:  ground truth, validation runs, thresholds
    compliance:  regulatory metamodel, coverage, similarity, reports
    api:         REST API endpoints
    web:         server-rendered HTML routes
    cli:         verity CLI subcommands
    cross_cutting: security, logging, RBAC
    # Special
    flaky:       known intermittent — investigate, do not skip lightly
    security:    security-focused (SQL injection, redaction, RBAC)

# Quiet noisy third-party deprecation warnings while keeping warnings
# from our own code visible.
filterwarnings =
    ignore::DeprecationWarning:psycopg_pool.*

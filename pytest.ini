[pytest]
# Workspace-root pytest config. Lives here (not in verity/pyproject.toml)
# so VSCode's Python Testing UI auto-discovers tests when the workspace
# folder is opened.
#
# When edms/insurance_docgen/uw_demo grow test suites, append their tests
# directories to `testpaths` below — no per-project pytest.ini needed.

# Test discovery — paths relative to this file (the repo root).
testpaths = verity/tests

# Default file/class/function naming. Same as pytest's built-in defaults,
# stated explicitly so future readers don't have to guess.
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Async test mode. With "auto", every `async def test_*` runs in an event
# loop without needing a per-test `@pytest.mark.asyncio` decorator.
asyncio_mode = auto

# Default command-line flags applied on every run.
addopts =
    --verbose
    --tb=short
    --strict-markers
    -ra
    --color=yes

# Markers must be declared here; --strict-markers above turns typos into
# errors instead of silently ignored test collection.
markers =
    unit: pure-Python test with no I/O — fast
    integration: real Postgres + mocked LLM/EDMS — slower but exercises real SQL
    slow: takes more than ~1s on a developer machine
    database: requires a running Postgres reachable via VERITY_TEST_DATABASE_URL

# Quiet noisy third-party deprecation warnings while keeping warnings
# from our own code visible.
filterwarnings =
    ignore::DeprecationWarning:psycopg_pool.*
